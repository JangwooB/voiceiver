<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voiceiver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1.25rem 1rem 3rem; }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.25rem; }
  .card { background: white; border-radius: 16px; padding: 1rem 1.25rem; margin-bottom: 1rem; border: 0.5px solid rgba(0,0,0,0.08); }

  .video-wrap { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #111; }
  #videoEl { width: 100%; display: block; transform: scaleX(-1); }
  #lipCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .bar-wrap { margin-top: 0.75rem; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin-bottom: 5px; }
  .bar-bg { background: #f5f5f0; border-radius: 99px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.08s; width: 0%; }
  .bar-fill.lip { background: #1D9E75; }
  .lip-status { margin-top: 0.75rem; border-radius: 10px; padding: 0.6rem 1rem; font-size: 14px; font-weight: 500; text-align: center; background: #f5f5f0; color: #888; }
  .lip-status.open { background: #E1F5EE; color: #0F6E56; }

  .db-display { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; }
  .db-number { font-size: 36px; font-weight: 700; color: #1a1a1a; line-height: 1; }
  .db-unit { font-size: 14px; color: #888; margin-left: 4px; margin-bottom: 4px; }
  .db-level-badge { font-size: 13px; font-weight: 600; padding: 5px 12px; border-radius: 99px; }
  .level-whisper { background: #E6F1FB; color: #185FA5; }
  .level-normal  { background: #E1F5EE; color: #0F6E56; }
  .level-loud    { background: #FAEEDA; color: #854F0B; }
  .level-shout   { background: #FCEBEB; color: #A32D2D; }
  .level-silent  { background: #f5f5f0; color: #888; }
  .db-bar-bg { background: #f5f5f0; border-radius: 99px; height: 14px; overflow: hidden; }
  .db-bar-fill { height: 100%; border-radius: 99px; transition: width 0.1s, background 0.1s; width: 0%; }
  .db-range-labels { display: flex; justify-content: space-between; margin-top: 5px; }
  .db-range-labels span { font-size: 10px; color: #bbb; }

  .transcript-box { border: 0.5px solid rgba(0,0,0,0.08); border-radius: 12px; padding: 1rem; min-height: 80px; background: #fafafa; margin-bottom: 1rem; }
  .transcript-label { font-size: 11px; color: #888; margin-bottom: 6px; }
  .transcript-text { font-size: 17px; color: #1a1a1a; line-height: 1.6; min-height: 40px; }
  .placeholder { color: #bbb; font-size: 14px; }

  .feedback-item { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; font-size: 14px; line-height: 1.5; color: #1a1a1a; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .tag.good { background: #E1F5EE; color: #0F6E56; }
  .tag.tip  { background: #FAEEDA; color: #854F0B; }
  .tag.warn { background: #FCEBEB; color: #A32D2D; }

  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.75rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .dot.active { background: #E24B4A; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .status-text { font-size: 13px; color: #888; }

  .btn-row { display: flex; gap: 8px; }
  button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; -webkit-appearance: none; }
  .primary { background: #1D9E75; color: white; }
  .primary:active { background: #0F6E56; }
  .stop-btn { background: #fff0f0; color: #E24B4A; border: 0.5px solid #ffcccc; }
  button:disabled { opacity: 0.4; }
  .hidden { display: none; }
</style>
</head>
<body>

<h1>Voiceiver</h1>
<p class="subtitle">청각 장애인을 위한 발화 시각화 도우미</p>

<div class="card">
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="status">시작 버튼을 눌러주세요</span>
  </div>
  <div class="video-wrap" id="videoWrap">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="lipCanvas"></canvas>
  </div>
  <div class="bar-wrap">
    <div class="bar-label"><span>입 벌림</span><span id="lipPct">0%</span></div>
    <div class="bar-bg"><div class="bar-fill lip" id="lipBar"></div></div>
  </div>
  <div class="lip-status" id="lipStatus">입이 닫혀있어요</div>
</div>

<div class="card">
  <div class="db-display">
    <div style="display:flex;align-items:flex-end;">
      <span class="db-number" id="dbNumber">--</span>
      <span class="db-unit">dB</span>
    </div>
    <span class="db-level-badge level-silent" id="dbBadge">대기 중</span>
  </div>
  <div class="db-bar-bg">
    <div class="db-bar-fill" id="dbBar"></div>
  </div>
  <div class="db-range-labels">
    <span>속삭임</span>
    <span>일상 대화</span>
    <span>큰 소리</span>
  </div>
</div>

<div class="card">
  <div class="transcript-box">
    <div class="transcript-label">인식된 텍스트</div>
    <div class="transcript-text placeholder" id="transcript">말씀해주시면 여기에 표시됩니다...</div>
  </div>
  <div class="btn-row">
    <button class="primary" id="startBtn" onclick="startAll()">시작</button>
    <button class="stop-btn" id="stopBtn" onclick="stopAll()" disabled>중지</button>
  </div>
</div>

<div class="card hidden" id="feedbackCard">
  <div class="transcript-label" style="margin-bottom:10px;">피드백</div>
  <div id="feedbackItems"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
var recognition, faceMesh, camera;
var audioCtx, analyser, micSource, micStream, rafId;
var lipCanvas = document.getElementById('lipCanvas');
var lCtx = lipCanvas.getContext('2d');
var videoEl = document.getElementById('videoEl');

var LIPS_OUTER = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
var LIP_TOP = 13, LIP_BOTTOM = 14, LIP_LEFT = 61, LIP_RIGHT = 291;

/* 캔버스를 실제 렌더링된 비디오 크기에 맞게 동기화 */
function syncCanvas() {
  var rect = videoEl.getBoundingClientRect();
  lipCanvas.width = rect.width;
  lipCanvas.height = rect.height;
}

function onFaceResults(results) {
  syncCanvas();
  var W = lipCanvas.width, H = lipCanvas.height;
  lCtx.clearRect(0, 0, W, H);
  if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) return;

  var lm = results.multiFaceLandmarks[0];

  /* 미러링(scaleX(-1)) 때문에 x 좌표를 반전 */
  function px(lmPoint) {
    return { x: (1 - lmPoint.x) * W, y: lmPoint.y * H };
  }

  lCtx.beginPath();
  LIPS_OUTER.forEach(function(idx, i) {
    var p = px(lm[idx]);
    i === 0 ? lCtx.moveTo(p.x, p.y) : lCtx.lineTo(p.x, p.y);
  });
  lCtx.closePath();
  lCtx.strokeStyle = '#1D9E75';
  lCtx.lineWidth = 2.5;
  lCtx.stroke();
  lCtx.fillStyle = 'rgba(29,158,117,0.15)';
  lCtx.fill();

  var top = px(lm[LIP_TOP]), bottom = px(lm[LIP_BOTTOM]);
  var left = px(lm[LIP_LEFT]), right = px(lm[LIP_RIGHT]);
  var openH = Math.abs(bottom.y - top.y);
  var openW = Math.abs(right.x - left.x);
  var pct = openW > 0 ? Math.min(Math.round((openH / (openW * 0.6)) * 100), 100) : 0;

  document.getElementById('lipBar').style.width = pct + '%';
  document.getElementById('lipPct').textContent = pct + '%';

  var statusEl = document.getElementById('lipStatus');
  if (pct > 20) {
    statusEl.textContent = '입이 열려있어요 (' + pct + '%)';
    statusEl.className = 'lip-status open';
  } else {
    statusEl.textContent = '입이 닫혀있어요';
    statusEl.className = 'lip-status';
  }
}

/* 데시벨 */
function getDbLevel(db) {
  if (db < -50) return { label:'무음', cls:'level-silent', pct:0, color:'#ccc' };
  if (db < -35) return { label:'속삭임', cls:'level-whisper', pct:Math.round((db+50)/15*33), color:'#378ADD' };
  if (db < -20) return { label:'일상 대화', cls:'level-normal', pct:Math.round(33+(db+35)/15*34), color:'#1D9E75' };
  if (db < -10) return { label:'큰 소리', cls:'level-loud', pct:Math.round(67+(db+20)/10*20), color:'#EF9F27' };
  return { label:'소리치는 중', cls:'level-shout', pct:Math.min(87+Math.round((db+10)/10*13),100), color:'#E24B4A' };
}

function audioLoop() {
  if (!analyser) return;
  var td = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(td);
  var sum = 0;
  for (var i = 0; i < td.length; i++) sum += Math.pow(td[i]-128, 2);
  var rms = Math.sqrt(sum / td.length);
  if (rms > 1) {
    var db = Math.round(20 * Math.log10(rms / 128));
    var lv = getDbLevel(db);
    document.getElementById('dbNumber').textContent = db;
    var badge = document.getElementById('dbBadge');
    badge.textContent = lv.label;
    badge.className = 'db-level-badge ' + lv.cls;
    document.getElementById('dbBar').style.width = lv.pct + '%';
    document.getElementById('dbBar').style.background = lv.color;
  } else {
    document.getElementById('dbNumber').textContent = '--';
    document.getElementById('dbBadge').textContent = '무음';
    document.getElementById('dbBadge').className = 'db-level-badge level-silent';
    document.getElementById('dbBar').style.width = '0%';
  }
  rafId = requestAnimationFrame(audioLoop);
}

function startAll() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('dot').classList.add('active');
  document.getElementById('status').textContent = '분석 중...';
  document.getElementById('feedbackCard').classList.add('hidden');

  navigator.mediaDevices.getUserMedia({audio:true, video:false}).then(function(s) {
    micStream = s;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    micSource = audioCtx.createMediaStreamSource(s);
    micSource.connect(analyser);
    audioLoop();
  }).catch(function() {
    document.getElementById('status').textContent = '마이크 권한이 필요합니다.';
  });

  faceMesh = new FaceMesh({locateFile: function(f) {
    return 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/' + f;
  }});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
  faceMesh.onResults(onFaceResults);
  camera = new Camera(videoEl, {
    onFrame: async function() { await faceMesh.send({image: videoEl}); },
    width: 640, height: 480
  });
  camera.start();

  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (SR) {
    recognition = new SR();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.onresult = function(e) {
      var txt = '';
      for (var i = e.resultIndex; i < e.results.length; i++) txt += e.results[i][0].transcript;
      var el = document.getElementById('transcript');
      el.classList.remove('placeholder');
      el.textContent = txt || '...';
    };
    recognition.onerror = function() {};
    recognition.start();
  }
}

function stopAll() {
  if (rafId) cancelAnimationFrame(rafId);
  if (camera) camera.stop();
  if (recognition) try { recognition.stop(); } catch(e) {}
  if (micStream) micStream.getTracks().forEach(function(t){t.stop();});
  if (audioCtx) audioCtx.close();
  analyser = null;
  lCtx.clearRect(0, 0, lipCanvas.width, lipCanvas.height);
  document.getElementById('dot').classList.remove('active');
  document.getElementById('status').textContent = '분석 완료';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('lipBar').style.width = '0%';
  document.getElementById('lipPct').textContent = '0%';
  document.getElementById('lipStatus').textContent = '입이 닫혀있어요';
  document.getElementById('lipStatus').className = 'lip-status';
  document.getElementById('dbBar').style.width = '0%';
  document.getElementById('dbNumber').textContent = '--';
  document.getElementById('dbBadge').textContent = '대기 중';
  document.getElementById('dbBadge').className = 'db-level-badge level-silent';
  showFeedback();
}

function showFeedback() {
  var txt = document.getElementById('transcript').textContent;
  var badge = document.getElementById('dbBadge').textContent;
  var items = [];
  var ok = txt && txt !== '말씀해주시면 여기에 표시됩니다...' && txt !== '...';
  if (ok) {
    items.push({tag:'good', text:'"'+txt.slice(0,20)+(txt.length>20?'...':'')+'" 발화가 인식되었습니다.'});
  } else {
    items.push({tag:'tip', text:'발화가 인식되지 않았습니다. 더 크고 천천히 말씀해보세요.'});
  }
  if (badge === '소리치는 중') {
    items.push({tag:'warn', text:'목소리가 매우 큽니다. 조금 더 부드럽게 말씀해보세요.'});
  } else if (badge === '속삭임') {
    items.push({tag:'tip', text:'목소리가 작습니다. 일상 대화 수준으로 조금 더 크게 말씀해보세요.'});
  } else if (badge === '일상 대화') {
    items.push({tag:'good', text:'목소리 크기가 적절합니다.'});
  }
  document.getElementById('feedbackItems').innerHTML = items.map(function(i){
    return '<div class="feedback-item"><span class="tag '+i.tag+'">'+(i.tag==='good'?'잘됨':i.tag==='warn'?'주의':'개선')+'</span><span>'+i.text+'</span></div>';
  }).join('');
  document.getElementById('feedbackCard').classList.remove('hidden');
}

window.addEventListener('resize', syncCanvas);
</script>
</body>
</html>
